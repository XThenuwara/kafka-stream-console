name: Deploy Kafka Stream Console

on:
  push:
    branches:
      - main
      - master # Deploy from main or master branch

permissions:
  contents: write # Required for deploying to gh-pages branch

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: npm
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Static HTML Export
        env:
          NEXT_EXPORT: "true"
        run: |
          mv src/app/api src/api-temp
          npm run build
          mv src/api-temp src/app/api
          touch out/.nojekyll

      - name: Deploy Static Web Assets to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out # Next.js static output directory
          branch: gh-pages # Target branch for static hosting
          clean: true
